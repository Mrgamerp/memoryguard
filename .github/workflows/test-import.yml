name: Test Import

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install psutil
      - name: List files
        run: ls -la
      - name: List memoryguard
        run: ls -la memoryguard/
      - name: Try import core
        run: python -c "import sys; sys.path.insert(0, '.'); from memoryguard.core import MemoryGuard; print('OK')"
