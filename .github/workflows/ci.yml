name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: pytest tests/ -v
    
    - name: Run tests with coverage
      run: pytest tests/ --cov=memoryguard --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install black flake8 mypy
        pip install -e ".[dev]"
    
    - name: Check formatting with black
      run: black --check memoryguard/ tests/
    
    - name: Lint with flake8
      run: flake8 memoryguard/ tests/ --max-line-length=100
    
    - name: Type check with mypy
      run: mypy memoryguard/

  memory-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -e ".[all]"
        sudo apt-get install -y valgrind
    
    - name: Run memory tests
      run: pytest tests/test_memoryguard.py -v -k "memory"
    
    - name: Run demo
      run: python examples/demo.py
    
    - name: Upload memory report
      uses: actions/upload-artifact@v3
      with:
        name: memory-report
        path: memory-report.json
